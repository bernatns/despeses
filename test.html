<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: monospace; padding: 20px; background: #f0f0f0; }
  .box { background: white; border-radius: 8px; padding: 16px; margin: 10px 0; }
  .ok { color: green; font-weight: bold; }
  .err { color: red; font-weight: bold; }
  .info { color: #555; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
  input { padding: 8px; font-size: 14px; width: 280px; margin: 5px; }
  #log { white-space: pre-wrap; font-size: 12px; }
</style>
</head>
<body>
<h2>Test connexió Supabase</h2>

<div class="box">
  <div><b>URL:</b> https://nnroezpcwjlwkqylasfb.supabase.co</div>
  <div id="status" class="info">Iniciant...</div>
</div>

<div class="box">
  <input type="email" id="email" placeholder="correu@exemple.com">
  <input type="password" id="pass" placeholder="contrasenya">
  <br>
  <button onclick="testLogin()">Test Login</button>
  <button onclick="testQuery()">Test Query</button>
  <button onclick="testAll()">Test Tot</button>
</div>

<div class="box">
  <b>Log:</b><br>
  <div id="log"></div>
</div>

<script>
const SUPABASE_URL = 'https://nnroezpcwjlwkqylasfb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ucm9lenBjd2psd2txeWxhc2ZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzYxNjUsImV4cCI6MjA5NjQ1MjE2NX0.fzFNzDfpVg5we7lrNfdle036MoKKEZAE3CoTuU5AUk4';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls || 'info';
  line.textContent = new Date().toISOString().slice(11,19) + ' ' + msg;
  el.appendChild(line);
}

async function testLogin() {
  const email = document.getElementById('email').value;
  const pass  = document.getElementById('pass').value;
  log('Intentant login amb ' + email + '...', 'info');
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { log('ERROR login: ' + error.message + ' | codi: ' + error.status, 'err'); return; }
    log('LOGIN OK! User ID: ' + data.user.id, 'ok');
  } catch(e) {
    log('EXCEPCIO: ' + e.message, 'err');
  }
}

async function testQuery() {
  log('Testant query a categories...', 'info');
  try {
    const { data, error } = await sb.from('categories').select('*').limit(5);
    if (error) { log('ERROR query: ' + error.message + ' | codi: ' + error.code, 'err'); return; }
    log('QUERY OK! ' + (data?.length || 0) + ' files retornades', 'ok');
    if (data?.length) log('Exemple: ' + JSON.stringify(data[0]), 'info');
  } catch(e) {
    log('EXCEPCIO: ' + e.message, 'err');
  }
}

async function testAll() {
  log('=== TEST COMPLET ===', 'info');
  const tables = ['categories', 'expenses', 'merchants', 'bank_formats'];
  for (const t of tables) {
    try {
      const start = Date.now();
      const { data, error } = await sb.from(t).select('*').limit(1);
      const ms = Date.now() - start;
      if (error) {
        log('TAULA ' + t + ': ERROR - ' + error.message + ' (' + error.code + ')', 'err');
      } else {
        log('TAULA ' + t + ': OK (' + ms + 'ms, ' + (data?.length||0) + ' files)', 'ok');
      }
    } catch(e) {
      log('TAULA ' + t + ': EXCEPCIO - ' + e.message, 'err');
    }
  }
}

// Auto-check session
sb.auth.getSession().then(({ data }) => {
  const status = document.getElementById('status');
  if (data.session) {
    status.textContent = 'Sessió activa: ' + data.session.user.email;
    status.className = 'ok';
  } else {
    status.textContent = 'Sense sessió activa';
    status.className = 'info';
  }
  log('Supabase client inicialitzat', 'ok');
});
</script>
</body>
</html>
